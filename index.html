<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>燈牌模擬</title>
    <style>
        :root {
            --bg: #05050a;
            --panel: rgba(20, 20, 35, 0.9);
            --neon-cyan: #00f2ff;
            --neon-pink: #ff007a;
            --text: #e0e0e0;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 側邊控制面板 */
        aside {
            width: 280px;
            background: var(--panel);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }

        .logo h2 {
            color: var(--neon-cyan);
            margin: 0;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
            letter-spacing: 2px;
        }

        .status-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--neon-pink);
            font-family: monospace;
            font-size: 0.9rem;
        }

        /* 按鈕設計 */
        .btn-primary {
            background: var(--neon-cyan);
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary:hover {
            box-shadow: 0 0 15px var(--neon-cyan);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
        }

        /* 畫布區域 */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #101025 0%, #05050a 100%);
            position: relative;
        }

        canvas {
            border: 1px solid rgba(0, 242, 255, 0.2);
            background: #000;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            cursor: crosshair;
            touch-action: none;
        }

        .controls-hint {
            margin-top: auto;
            font-size: 0.8rem;
            opacity: 0.5;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<aside>
    <div class="logo">
        <h2>燈牌模擬</h2>
        <p style="font-size: 0.7rem; opacity: 0.6; margin-top: 5px;">PIXEL SKETCHPAD</p>
    </div>
    
    <div class="status-card">
        MODE: <span style="color: var(--neon-pink);">FREE DRAW</span><br>
        PIXELS: <span id="pixelCount">0</span>
    </div>

    <button id="saveBtn" class="btn-primary">儲存創作</button>
    <button id="clearBtn" class="btn-secondary">清空畫布</button>
    
    <div class="controls-hint">
        <strong>操作手冊：</strong><br>
        • 滑鼠左鍵：繪製螢光像素<br>
        • 滑鼠右鍵：擦除像素<br>
        • 拖曳：連續繪製線條
    </div>
</aside>

<main>
    <canvas id="artCanvas"></canvas>
</main>

<script>
    const canvas = document.getElementById('artCanvas');
    const ctx = canvas.getContext('2d');
    const pixelDisplay = document.getElementById('pixelCount');

    // 網格設定
    const cellSize = 18; // 稍微放大格子，更好畫
    const cols = 45;
    const rows = 30;
    canvas.width = cols * cellSize;
    canvas.height = rows * cellSize;

    // 儲存像素資料 (1 代表有畫，0 代表空白)
    let grid = Array.from({ length: cols }, () => Array(rows).fill(0));
    let drawingMode = null; 

    // 渲染函數：只負責把 grid 畫出來
    function render() {
        ctx.fillStyle = '#05050a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        let activeCount = 0;

        for (let i = 0; i < cols; i++) {
            for (let j = 0; j < rows; j++) {
                if (grid[i][j]) {
                    // 螢光效果
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#00f2ff';
                    ctx.fillStyle = '#00f2ff';
                    // 畫一個帶圓角的矩形像素
                    ctx.beginPath();
                    const padding = 2;
                    ctx.roundRect(
                        i * cellSize + padding, 
                        j * cellSize + padding, 
                        cellSize - padding*2, 
                        cellSize - padding*2, 
                        4
                    );
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    activeCount++;
                } else {
                    // 背景裝飾點
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.03)';
                    ctx.beginPath();
                    ctx.arc(i * cellSize + cellSize/2, j * cellSize + cellSize/2, 1, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }
        pixelDisplay.innerText = activeCount;
    }

    // 取得精確座標
    function handleInput(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = Math.floor((e.clientX - rect.left) * scaleX / cellSize);
        const y = Math.floor((e.clientY - rect.top) * scaleY / cellSize);

        if (x >= 0 && x < cols && y >= 0 && y < rows) {
            grid[x][y] = drawingMode;
            render();
        }
    }

    // 滑鼠事件監聽
    canvas.addEventListener('mousedown', (e) => {
        e.preventDefault();
        // 左鍵(0)畫圖，右鍵(2)擦除
        drawingMode = (e.button === 2) ? 0 : 1;
        handleInput(e);
    });

    canvas.addEventListener('mousemove', (e) => {
        if (drawingMode !== null) handleInput(e);
    });

    window.addEventListener('mouseup', () => {
        drawingMode = null;
    });

    // 禁用畫布上的右鍵選單
    canvas.addEventListener('contextmenu', (e) => e.preventDefault());

    // 按鈕功能
    document.getElementById('clearBtn').onclick = () => {
        grid = Array.from({ length: cols }, () => Array(rows).fill(0));
        render();
    };

    document.getElementById('saveBtn').onclick = () => {
        const link = document.createElement('a');
        link.download = 'my-manta-ray.png';
        link.href = canvas.toDataURL();
        link.click();
    };

    // 初始渲染
    render();
</script>
</body>
</html>
